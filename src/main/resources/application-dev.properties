# 1. DATABASE CONNECTION (PostgreSQL 18)
spring.datasource.url=jdbc:postgresql://localhost:5432/saas_billing_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Dev-Specific Hibernate Settings
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. SERVER SETTINGS
server.port=8080
server.error.include-message=always

# 4. SECURITY CONTEXT
# 256-bit secure cryptographic key for HS256 algorithm signing
app.security.jwt.secret=enterprise-secret-key-must-be-at-least-256-bits-long-for-hmac-authentication-2026-saas-token
# Token Expiration window defined in milliseconds (86400000 ms = 24 Hours)
app.security.jwt.expiration=86400000